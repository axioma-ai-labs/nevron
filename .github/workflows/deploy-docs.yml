name: Build and Deploy MkDocs

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: 'true'
      
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install and configure Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.0.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Set up cache
        uses: actions/cache@v3
        id: cached-poetry-dependencies
        with:
          path: .venv
          key: venv-${{ runner.os }}-python-3.13-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: poetry install
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'

      - name: Check mike version
        run: |
          poetry run mike --version

      - name: Configure Git user
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      # Create gh-pages branch if it doesn't exist
      - name: Create gh-pages branch if needed
        run: |
          # Try to fetch gh-pages branch
          git fetch origin gh-pages || true
          
          # Check if gh-pages branch exists remotely
          if git ls-remote --heads origin gh-pages | grep -q gh-pages; then
            echo "gh-pages branch exists remotely"
          else
            echo "Creating new gh-pages branch"
            # Create an orphan branch with no parent
            git checkout --orphan gh-pages-temp
            git rm -rf .
            touch .nojekyll
            git add .nojekyll
            git commit -m "Initial gh-pages commit"
            git push origin gh-pages-temp:gh-pages
            # Go back to the original branch
            git checkout ${{ github.ref_name }}
            git branch -D gh-pages-temp
          fi

      # Deploy documentation based on branch
      - name: Deploy docs for main branch (stable)
        if: github.ref == 'refs/heads/main'
        run: |
          poetry run mike deploy stable latest --push
          poetry run mike set-default stable --push

      - name: Deploy docs for dev branch
        if: github.ref == 'refs/heads/dev'
        run: |
          poetry run mike deploy dev --push

