name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: 'true'
      
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install and configure Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.0.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Set up cache
        uses: actions/cache@v3
        id: cached-poetry-dependencies
        with:
          path: .venv
          key: venv-${{ runner.os }}-python-3.13-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: poetry install
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'

      - name: Configure Git user
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Install mike
        run: |
          poetry add mike==1.1.2
          poetry run mike --version
          
      # Commit any changes to poetry files
      - name: Commit poetry changes
        run: |
          git add poetry.lock pyproject.toml
          git diff --staged --quiet || git commit -m "Update dependencies with mike"

      # Setup gh-pages branch
      - name: Setup gh-pages branch
        run: |
          # Create a temporary directory for gh-pages
          mkdir -p /tmp/gh-pages
          
          # Try to fetch gh-pages branch
          git fetch origin gh-pages || true
          
          # Check if gh-pages branch exists
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            echo "gh-pages branch exists, creating from origin/gh-pages"
            git worktree add /tmp/gh-pages origin/gh-pages
          else
            echo "Creating new gh-pages branch"
            git worktree add --detach /tmp/gh-pages
            cd /tmp/gh-pages
            git checkout --orphan gh-pages
            git rm -rf . || true
            touch .nojekyll
            git add .nojekyll
            git commit -m "Initial gh-pages commit"
            git push origin gh-pages
          fi

      # Build and deploy documentation based on branch
      - name: Build and deploy docs for main branch (stable)
        if: github.ref == 'refs/heads/main'
        run: |
          poetry run mike deploy stable latest -b /tmp/gh-pages
          poetry run mike set-default stable -b /tmp/gh-pages
          cd /tmp/gh-pages
          git push origin gh-pages

      - name: Build and deploy docs for dev branch
        if: github.ref == 'refs/heads/dev'
        run: |
          poetry run mike deploy dev -b /tmp/gh-pages
          cd /tmp/gh-pages
          git push origin gh-pages

  # This job handles the GitHub Pages deployment
  pages:
    needs: build_and_deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

